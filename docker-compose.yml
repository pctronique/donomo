# Adopt version 2 syntax:
#   https://docs.docker.com/compose/compose-file/#/versioning
version: '3.27'

services:
###########################
# Setup the PHP container
###########################
    nodjs:
        container_name: ${NAME_NODEJS_CONTAINER}
        build: .docker/nodejs
        restart: always
        tty: true
        stdin_open: true
        depends_on:
            - mongo
        volumes:
            - ./.docker/config/connection_server.json:/home/project/config/connection_server.json:rw
            - ./.docker/config/connection_mongo.json:/home/project/config/connection_mongo.json:rw
            - ./.docker/config/updateProject.sh:/home/project/updateProject.sh:rw
            - ./.docker/nodejs/startserver:/etc/init.d/startserver:rw
            - ./project:/home/project:rw
            - ./projecttmp/logs/pm2:/root/.pm2/logs/:rw
            - ./projecttmp/tmp/nodejs:/home/projecttmp/tmp/nodejs:rw
        ports:
            - ${VALUE_NODEJS_PORT}:3000

    mongo:
        container_name: ${NAME_SGBD_CONTAINER}
        image: mongo
        volumes:
            - ./projecttmp/mongo_data:/data/db
            - ./mongo-seed:/mongo-seed
        environment:
            - MONGO_INITDB_DATABASE=dnodejs
            - MONGO_INITDB_ROOT_USERNAME=root
            - MONGO_INITDB_ROOT_PASSWORD=secret
        command:
            - /mongo-seed/import.sh
        ports:
            - ${VALUE_SGBD_PORT}:27017
       
    mongo-express:
        image: mongo-express
        container_name: ${NAME_MOEXPRESS_CONTAINER}
        environment:
            - ME_CONFIG_MONGODB_ADMINUSERNAME=root
            - ME_CONFIG_MONGODB_ADMINPASSWORD=secret
            - ME_CONFIG_MONGODB_URL=mongodb://root:secret@mongo:27017
        links:
            - mongo
        ports:
            - ${VALUE_MOEXPRESS_PORT}:8081
        
###########################
# Setup the mailhog container
###########################
    mailhog:
        container_name: ${NAME_MAILHOG_CONTAINER}
        image: mailhog/mailhog
        ports:
            - ${VALUE_MAILHOG_DISPLAY_PORT}:8025
